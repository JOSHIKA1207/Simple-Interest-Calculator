<!DOCTYPE html>
<html>
<head>
    <title>Simple Interest Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        .container {
            width: 300px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        h2 {
            color: #333;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Simple Interest Calculator</h2>

        <input type="number" id="principal" placeholder="Enter Principal Amount">

        <input type="number" id="rate" placeholder="Enter Rate of Interest">

        <input type="number" id="time" placeholder="Enter Time (Years)">

        <button onclick="calculateSI()">Calculate</button>

        <p id="result"></p>
    </div>

    <script>
        function calculateSI() {
            let p = parseFloat(document.getElementById("principal").value);
            let r = parseFloat(document.getElementById("rate").value);
            let t = parseFloat(document.getElementById("time").value);

            let si = (p * r * t) / 100;

            document.getElementById("result").innerHTML =
                "Simple Interest = " + si;
        }
    </script>

</body>
</html>
